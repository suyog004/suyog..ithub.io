name: CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy with Docker
        run: |
          echo "🚀 Starting deployment..."

          docker compose down || true
          docker compose up -d --build

          echo "✅ Deployment successful"